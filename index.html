<!DOCTYPE html>

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mental Maths</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[url('xutKlx1.webp')] bg-center bg-cover bg-black/50 bg-blend-overlay" id="homepage">

        <div class="text-7xl font-extrabold text-white text-shadow-gray-300 font-mono text-center">Welcome to Mental Maths</div>
