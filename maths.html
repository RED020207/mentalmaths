<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maths</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="https://cdn.jsdelivr.net/npm/mathjax@4/tex-mml-chtml.js"></script>
</head>
    <body class="bg-linear-to-r from-black to-gray-600">
        <div class="flex flex-col items-center justify-around h-screen" id="box">
            <div class="text-white">\(a \ne b\)</div>
            <form id="answer" class="flex flex-col items-center">
                <input type="number" id="input" class="bg-gray-800 text-white text-4xl w-80 font-bold rounded-md px-5 py-3 border-0 focus:ring-2 focus:ring-white focus:outline-none" autocomplete="off" autofocus placeholder="Enter answer">
                <button type="submit" display="none"></button>
            </form>
            <div class="text-white" id="time"></div>
        </div>
    </body>
    <script type="module" src="main.js"></script>
</html>
